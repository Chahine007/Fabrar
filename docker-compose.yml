services:
  backend:
    build: .
    command: npm start
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/app.db
    volumes:
      - ./:/app
      - /app/node_modules
      - sqlite_data:/app/data
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: "512m"
    mem_reservation: "256m"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
    external: true
    name: rendicontazione_sqlite_data
