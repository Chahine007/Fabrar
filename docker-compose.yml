services:
  backend:
    build: .
    command: npm start
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PRISMA_DB_URL=postgresql://fabrar:fabrar_password@db:5432/fabrar_erp?schema=public
      - DB_BACKUP_DIR=/app/backups
    volumes:
      - ./backups:/app/backups
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1024m
        reservations:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fabrar
      POSTGRES_PASSWORD: fabrar_password
      POSTGRES_DB: fabrar_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
