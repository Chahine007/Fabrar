<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP Dashboard</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e293b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN for Scaffolding Phase -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Cache-bust version for dynamic view imports
    window.__APP_VERSION__ = "2026.03.31.3";
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4, .brand-logo { font-family: 'Space Grotesk', sans-serif; }

    /* ─── Print-friendly export ─── */
    @media print {
      aside, header, #__toast_container__, #__modal_overlay__,
      .no-print, button, select, input[type="checkbox"] { display: none !important; }
      body, main, #app-content { overflow: visible !important; }
      #app-content { padding: 0 !important; }
      .print-expand { height: auto !important; overflow: visible !important; }
      * { box-shadow: none !important; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden flex font-sans">

  <!-- SIDEBAR FIXA -->
  <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0 shadow-xl z-20 sticky top-0 h-screen">
    
    <!-- Sidebar Header / Logo -->
    <div class="p-6 flex items-center gap-3 border-b border-white/5">
      <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-500/30">
        <i data-lucide="activity" class="w-5 h-5"></i>
      </div>
      <span class="text-xl font-bold text-white tracking-tight">ERP Pro</span>
    </div>
    
    <!-- Navigation Menu -->
    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2" id="sidebarNav">
      <a href="#/dashboard" data-route="/dashboard" class="nav-link flex items-center gap-3 px-4 py-3 text-sm rounded-xl transition-all duration-200 group font-medium hover:bg-slate-800 hover:text-white">
        <i data-lucide="layout-dashboard" class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity"></i>
        <span>Dashboard</span>
      </a>

      <a href="#/cantieri" data-route="/cantieri" class="nav-link flex items-center justify-between px-4 py-3 text-sm rounded-xl transition-all duration-200 group font-medium hover:bg-slate-800 hover:text-white">
        <div class="flex items-center gap-3">
          <i data-lucide="briefcase" class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity"></i>
          <span>Job Costing</span>
        </div>
        <span id="badge-cantieri" class="hidden bg-amber-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full shadow-sm">0</span>
      </a>

      <a href="#/hr" data-route="/hr" class="nav-link flex items-center justify-between px-4 py-3 text-sm rounded-xl transition-all duration-200 group font-medium hover:bg-slate-800 hover:text-white">
        <div class="flex items-center gap-3">
          <i data-lucide="users" class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity"></i>
          <span>Risorse Umane</span>
        </div>
        <span id="badge-hr" class="hidden bg-rose-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full shadow-sm">0</span>
      </a>

      <a href="#/genya" data-route="/genya" class="nav-link flex items-center gap-3 px-4 py-3 text-sm rounded-xl transition-all duration-200 group font-medium hover:bg-slate-800 hover:text-white">
        <i data-lucide="file-spreadsheet" class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity"></i>
        <span>Importa Genya</span>
      </a>
    </nav>
    
    <!-- Sidebar Footer -->
    <div class="p-4 mt-auto border-t border-white/5">
      <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-800/50 transition-colors cursor-pointer group">
        <img src="https://ui-avatars.com/api/?name=Alessandro+Rossi&background=6366f1&color=fff" alt="User" class="w-10 h-10 rounded-full border-2 border-indigo-500/20 group-hover:border-indigo-500 transition-all shadow-sm" />
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold text-white truncate">Alessandro Rossi</p>
          <p class="text-xs text-slate-400 truncate">Admin System</p>
        </div>
        <i data-lucide="settings" class="w-4 h-4 text-slate-500 group-hover:text-white transition-colors"></i>
      </div>
    </div>
  </aside>

  <!-- MAIN SCROLLABLE AREA -->
  <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden relative">
    
    <!-- TOP HEADER -->
    <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 md:px-8 flex items-center justify-between sticky top-0 z-10 flex-shrink-0 shadow-sm">
      <div class="flex items-center gap-2">
        <span class="text-slate-400 font-medium text-sm hidden sm:inline">Navigazione /</span>
        <span id="breadcrumb" class="text-slate-800 font-bold text-lg md:text-xl tracking-tight brand-logo">Caricamento...</span>
      </div>
      
      <div class="flex items-center gap-4 md:gap-6">
        <div class="relative group hidden lg:block">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
          <input type="text" placeholder="Cerca nel gestionale..." class="bg-slate-100 border-none rounded-full py-2.5 pl-10 pr-4 w-64 xl:w-80 focus:ring-2 focus:ring-indigo-500/20 transition-all outline-none text-sm placeholder:text-slate-400" />
        </div>

        <div class="flex items-center gap-3 md:gap-4 lg:border-l lg:border-slate-200 lg:pl-6">
          <button class="p-2 text-slate-400 hover:bg-slate-100 hover:text-indigo-600 rounded-full transition-colors relative">
            <i data-lucide="message-square" class="w-5 h-5"></i>
            <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-indigo-500 rounded-full border-2 border-white"></span>
          </button>
          <button class="p-2 text-slate-400 hover:bg-slate-100 hover:text-rose-600 rounded-full transition-colors relative">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <span class="absolute -top-1 -right-1 w-5 h-5 bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white shadow-sm">5</span>
          </button>
          <div class="w-px h-6 bg-slate-200 mx-1 hidden sm:block"></div>
          <img src="https://ui-avatars.com/api/?name=Alessandro+Rossi&background=6366f1&color=fff" alt="User" class="w-9 h-9 md:w-10 md:h-10 rounded-full shadow-sm ring-2 ring-white cursor-pointer hover:ring-indigo-100 transition-all" />
        </div>
      </div>
    </header>

    <!-- ROUTER OUTLET (Dynamic Injection Container) -->
    <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50">
      <!-- Il codice HTML delle singole route verrà iniettato qui -->
    </div>

  </main>

  <!-- ENTRY POINT JS (Modulare ES6) -->
  <script type="module" src="/js/app.js?v=2026.03.31.3"></script>
  <script>
    lucide.createIcons();
    const versionEl = document.getElementById('appVersion');
    if (versionEl && window.__APP_VERSION__) {
      versionEl.textContent = `v${window.__APP_VERSION__}`;
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then((reg) => {
        reg.update();
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      });

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
