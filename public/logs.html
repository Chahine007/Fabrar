<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audit Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2c3e50;
      --primary-hover: #243242;
      --bg-color: #f8f9fa;
      --bg-elevated: #ffffff;
      --text-main: #333333;
      --text-muted: #6b7280;
      --border-color: #e6e7ea;
      --table-stripe: #f6f7f9;
    }
    body {
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8f9fa 0%, #f1f2f4 100%);
      color: var(--text-main);
      margin: 0;
      padding: 32px 20px 56px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      color: var(--text-main);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      letter-spacing: -0.01em;
      font-weight: 600;
    }
    .card {
      background: var(--bg-elevated);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 6px 16px rgba(17, 24, 39, 0.06);
      border: 1px solid rgba(15, 23, 42, 0.05);
    }
    .button-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background-color: #f4f5f7;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .button-link:hover { background-color: #eef0f2; box-shadow: none; }

    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 12px 16px; border-bottom: 1px solid var(--border-color); vertical-align: top; }
    th {
      background-color: #f1f2f4;
      font-weight: 600;
      color: var(--text-muted);
      user-select: none;
    }
    tbody tr:nth-child(even) { background-color: var(--table-stripe); }
    tbody tr:hover { background-color: #eef1f4; }
    .muted { color: var(--text-muted); font-size: 0.9rem; }
    .json-box {
      font-size: 0.75rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-width: 300px;
      margin: 0;
    }
    #loginOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-color);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .login-card {
      background: #fff; padding: 32px; border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 360px;
    }
    .login-card h2 { margin-bottom: 24px; text-align: center; color: var(--text-main); margin-top: 0; }
    .login-field { margin-bottom: 16px; }
    .login-field label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
    .login-field input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;}
    .login-error { color: var(--kpi-negative); margin-bottom: 16px; font-size: 0.9rem; display: none; text-align: center; font-weight: 600;}
    .login-btn { width: 100%; padding: 12px; font-size: 1rem; }
  </style>
</head>
<body>
  <div id="loginOverlay" style="display: none;">
    <div class="login-card">
      <h2>Accesso Riservato</h2>
      <div id="loginError" class="login-error">Credenziali errate</div>
      <div class="login-field">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="admin" autocomplete="username">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button id="loginBtn" class="login-btn">Accedi</button>
    </div>
  </div>

  <div class="container" style="display: none;">
    <div class="header-row">
      <h1>Audit Logs</h1>
      <a class="button-link" href="/">📊 Dashboard</a>
    </div>
    <div class="card">
      <div class="table-container">
        <table id="logsTable">
          <thead>
            <tr>
              <th>Data/Ora</th>
              <th>Dipendente</th>
              <th>Tipo</th>
              <th>Testo Originale</th>
              <th>JSON Estratto</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="muted" id="emptyState" style="display:none; margin-top: 12px;">Nessun log disponibile.</p>
    </div>
  </div>

  <script>
    function checkAuth() {
      const token = localStorage.getItem('jwt_token');
      if (!token) {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.querySelector('.container').style.display = 'none';
        return false;
      }
      document.getElementById('loginOverlay').style.display = 'none';
      document.querySelector('.container').style.display = 'block';
      return true;
    }

    async function fetchWithAuth(url, options = {}) {
      if (!checkAuth()) throw new Error("Unauthenticated");
      const token = localStorage.getItem('jwt_token');
      const headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
      const res = await fetch(url, { ...options, headers });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('jwt_token');
        checkAuth();
        throw new Error("Token scaduto o non valido");
      }
      return res;
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const user = document.getElementById("loginUser").value;
      const pass = document.getElementById("loginPass").value;
      const errEl = document.getElementById("loginError");
      errEl.style.display = 'none';
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login fallito");
        localStorage.setItem('jwt_token', data.token);
        if (checkAuth()) {
          document.getElementById("loginUser").value = "";
          document.getElementById("loginPass").value = "";
          loadLogs();
        }
      } catch (err) {
        errEl.innerText = err.message;
        errEl.style.display = 'block';
      }
    });

    function formatDateTime(value) {
      if (!value) return "-";
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return value;
      return dt.toLocaleString("it-IT");
    }

    function formatEmployee(row) {
      const fullName = [row.nome, row.cognome].filter(Boolean).join(" ");
      if (fullName) return fullName;
      return row.employee_id ? `ID ${row.employee_id}` : "-";
    }

    function formatJson(raw) {
      if (!raw) return "-";
      try {
        const parsed = JSON.parse(raw);
        return JSON.stringify(parsed, null, 2);
      } catch {
        return raw;
      }
    }

    async function loadLogs() {
      const tbody = document.querySelector("#logsTable tbody");
      const emptyState = document.getElementById("emptyState");
      tbody.innerHTML = "";

      let rows = [];
      try {
        rows = await fetchWithAuth("/api/logs").then(r => r.json());
      } catch (e) {
        return; // handle by login modal
      }
      if (!rows.length) {
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";

      rows.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${formatDateTime(row.timestamp_utc)}</td>
          <td><strong>${formatEmployee(row)}</strong></td>
          <td>${row.message_type || "-"}</td>
          <td>${row.raw_text || "-"}</td>
          <td><pre style="font-size: 0.75rem; white-space: pre-wrap; word-break: break-all; max-width: 300px;">${formatJson(row.extracted_json)}</pre></td>
        `;
        tbody.appendChild(tr);
      });
    }

    if (checkAuth()) {
      loadLogs();
    }
  </script>
</body>
</html>
